name: Weekly Security Ops

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  weekly-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety

      - name: Run Weekly Security Healthcheck
        shell: bash
        run: |
          set -euo pipefail
          cp .env.development .env
          ./scripts/security-healthcheck.sh | tee weekly-security-report.txt
          rm -f .env

      - name: Dependency Report
        continue-on-error: true
        run: |
          safety check --full-report | tee -a weekly-security-report.txt

      - name: Upload Weekly Report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-report
          path: weekly-security-report.txt
