name: Vercel Config Guard

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce single Vercel config
        shell: pwsh
        run: |
          ./scripts/check_vercel_config.ps1
