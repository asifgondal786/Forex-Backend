name: Monthly Business Ops

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  business-ops-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Business Ops Check
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/business-ops-check.sh | tee monthly-business-ops-report.txt

      - name: Upload Monthly Business Ops Report
        uses: actions/upload-artifact@v4
        with:
          name: monthly-business-ops-report
          path: monthly-business-ops-report.txt
