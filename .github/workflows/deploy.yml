name: Tajir CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Flutter Frontend — Analyze → Build Web → Deploy to Firebase Hosting
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: 🐦 Flutter Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Task 1 gate: must stay at 0 errors
      - name: flutter analyze (0 errors gate)
        run: |
          flutter analyze --no-fatal-infos 2>&1 | tee analyze_output.txt
          if grep -E "^error" analyze_output.txt; then
            echo "❌ flutter analyze found errors — blocking deploy"
            exit 1
          fi
          echo "✅ flutter analyze clean"

      - name: Run Flutter tests
        run: flutter test --no-pub
        continue-on-error: true   # tests may not exist yet; remove once test suite is added

      - name: Build Flutter Web (release)
        run: |
          flutter build web \
            --release \\\n            --dart-define=API_BASE_URL=https://forex-backend-production-bc44.up.railway.app \\\n            --dart-define=APP_WEB_URL=https://forexcompanion-e5a28.web.app \\\n            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
             \
            

      # Only deploy on push to main (not on PRs)
      - name: Deploy to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: forexcompanion-e5a28
          entryPoint: Frontend

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: FastAPI Backend — Lint → Test → Railway deploys automatically
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: 🐍 FastAPI Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      REDIS_ENABLED: "true"
      # Supabase / Firebase creds not needed for unit tests — use mocks
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FIREBASE_PROJECT_ID: forexcompanion-e5a28

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install dev/test extras
        run: pip install pytest pytest-asyncio httpx ruff

      - name: Ruff lint (fast Python linter)
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Run pytest
        run: |
          pytest tests/ -v \
            --tb=short \
            --asyncio-mode=auto \
            -x \
            2>&1 | tee pytest_output.txt || true
          # Fail the job only if tests/ directory exists AND tests fail
          if [ -d tests ] && [ "$(find tests -name '*.py' | wc -l)" -gt 0 ]; then
            pytest tests/ --tb=short --asyncio-mode=auto -q
          else
            echo "⚠️  No tests found — skipping. Add tests/test_*.py to enable."
          fi

      # Railway watches main branch and auto-deploys on push.
      # This step just triggers a manual redeploy via API as a safety net
      # if you ever need to force-redeploy without a code change.
      - name: Notify Railway deploy (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Backend CI passed. Railway will auto-deploy from main."
          echo "   Service URL: https://forex-backend-production-bc44.up.railway.app/healthz"
          # Optional: hit Railway redeploy API
          # curl -s -X POST \
          #   -H "Authorization: Bearer ${{ secrets.RAILWAY_API_KEY }}" \
          #   "https://backboard.railway.app/graphql/v2" \
          #   -H "Content-Type: application/json" \
          #   -d '{"query":"mutation { serviceInstanceRedeploy(id: \"YOUR_SERVICE_ID\") }"}' 

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Health Check — Ping production after both jobs pass (main only)
  # ─────────────────────────────────────────────────────────────────────────────
  health-check:
    name: 🏥 Production Health Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait 30s for Railway deploy to propagate
        run: sleep 30

      - name: Check backend /healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://forex-backend-production-bc44.up.railway.app/healthz)
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Backend health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Backend healthy — HTTP $STATUS"

      - name: Check backend /api/v1 versioned route
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://forex-backend-production-bc44.up.railway.app/api/health)
          echo "ℹ️  /api/health returned HTTP $STATUS (informational)"

      - name: Summary
        run: |
          echo "🚀 Tajir deploy complete"
          echo "   Frontend: https://forexcompanion-e5a28.web.app"
          echo "   Backend:  https://forex-backend-production-bc44.up.railway.app"


