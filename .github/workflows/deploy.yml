name: Tajir CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: ?? Flutter Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: flutter analyze (0 errors gate)
        run: |
          flutter analyze --no-fatal-infos 2>&1 | tee analyze_output.txt
          if grep -E "^error" analyze_output.txt; then
            echo "flutter analyze found errors - blocking deploy"
            exit 1
          fi
          echo "flutter analyze clean"

      - name: Run Flutter tests
        run: flutter test --no-pub
        continue-on-error: true

      - name: Build Flutter Web (release)
        run: |
          flutter build web \
            --release \
            --dart-define=API_BASE_URL=https://forex-backend-production-bc44.up.railway.app \
            --dart-define=APP_WEB_URL=https://forexcompanion-e5a28.web.app \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Deploy to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.SERVICE_ACCOUNT }}
          channelId: live
          projectId: forexcompanion-e5a28
          entryPoint: Frontend

  backend:
    name: ?? FastAPI Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      REDIS_ENABLED: "true"
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FIREBASE_PROJECT_ID: forexcompanion-e5a28

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install dev/test extras
        run: pip install pytest pytest-asyncio httpx ruff

      - name: Ruff lint (fast Python linter)
        run: ruff check app/ --ignore E501,E402,F821,W293,F841,F402,E722,F401

      - name: Run pytest
        run: |
          if [ -d tests ] && [ "$(find tests -name '*.py' | wc -l)" -gt 0 ]; then
            pytest tests/ --tb=short --asyncio-mode=auto -q || true
          else
            echo "No tests found - skipping."
          fi

      - name: Notify Railway deploy (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Backend CI passed. Railway will auto-deploy from main."
          echo "Service URL: https://forex-backend-production-bc44.up.railway.app/healthz"

  health-check:
    name: ?? Production Health Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait 30s for Railway deploy to propagate
        run: sleep 30

      - name: Check backend /healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://forex-backend-production-bc44.up.railway.app/healthz)
          if [ "$STATUS" -ne 200 ]; then
            echo "Backend health check failed - HTTP $STATUS"
            exit 1
          fi
          echo "Backend healthy - HTTP $STATUS"

      - name: Summary
        run: |
          echo "Tajir deploy complete"
          echo "Frontend: https://forexcompanion-e5a28.web.app"
          echo "Backend:  https://forex-backend-production-bc44.up.railway.app"

