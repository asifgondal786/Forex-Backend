# =============================================================================
# Tajir / Forex Companion AI — Local Development Stack
# Backend only — Supabase and Flutter run as-is (cloud + native)
# =============================================================================
#
# Usage:
#   docker compose up               # start with logs
#   docker compose up -d            # start detached
#   docker compose logs -f backend  # tail logs
#   docker compose down             # stop
#
# Backend:  http://localhost:8000
# Docs UI:  http://localhost:8000/docs
# Health:   http://localhost:8000/health
# =============================================================================

version: "3.9"

services:

  backend:
    image: python:3.12-slim
    container_name: tajir-backend
    working_dir: /app

    volumes:
      # Live-mount your source — uvicorn --reload picks up every file save
      - type: bind
        source: ./Backend
        target: /app

    env_file:
      # All secrets (Firebase, Supabase cloud, Gemini, Brevo) from here
      # This file is already in .gitignore — never committed
      - ./Backend/.env.development

    environment:
      ENVIRONMENT: development
      # Supabase stays on cloud — no override needed
      # Uncomment below only if you later add a local DB:
      # SUPABASE_URL: http://host.docker.internal:54321

    ports:
      - "8000:8000"

    # Install deps then start with hot-reload
    # pip cache is inside the container — reinstall only when requirements.txt changes
    command: >
      sh -c "
        pip install --quiet --no-cache-dir -r requirements.txt &&
        uvicorn app.main:app
          --host 0.0.0.0
          --port 8000
          --reload
          --reload-dir /app/app
          --log-level info
      "

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s   # give pip install time on first boot